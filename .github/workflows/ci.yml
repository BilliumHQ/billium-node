name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs from earlier pushes to the same PR/branch when a new
# push lands. Saves CI minutes and surfaces results from the latest commit
# faster — what you almost always actually want.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      # Don't cancel the whole matrix when one Node version fails — we want
      # to see which specific versions break, not just the first failure.
      fail-fast: false
      matrix:
        # 18.x: oldest LTS this SDK declares support for (engines.node).
        # 20.x: current active LTS, what most users actually run.
        # 22.x: current LTS, where new bugs tend to surface first.
        node-version: ['18.x', '20.x', '22.x']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Build first: @billium/mcp's typecheck (and tests) import @billium/node,
      # whose type declarations live in its built dist/. Without a prior build
      # the workspace lint fails with TS2307 "Cannot find module '@billium/node'".
      - name: Build
        run: npm run build

      - name: Lint (typecheck src and tests)
        run: npm run lint

      - name: Test
        run: npm test

      # Catches the silent class of bug where someone bumps package.json
      # but forgets src/version.ts (or vice versa). Run only on one Node
      # version since the check is identical across all of them.
      - name: Verify package.json and src/version.ts agree
        if: matrix.node-version == '20.x'
        working-directory: packages/node
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          SRC_VERSION=$(node -p "require('./dist/index.js').SDK_VERSION || 'missing'")
          if [ "$PKG_VERSION" != "$SRC_VERSION" ]; then
            echo "::error::Version mismatch — package.json reports $PKG_VERSION but src/version.ts (built) reports $SRC_VERSION"
            echo "Bump both or neither."
            exit 1
          fi
          echo "Versions match: $PKG_VERSION"

      # Same drift guard for @billium/mcp. Its entrypoint is an ESM CLI bin, not
      # a library that re-exports the version, so compare package.json against
      # the literal in src/version.ts directly rather than the built output.
      - name: Verify @billium/mcp package.json and src/version.ts agree
        if: matrix.node-version == '20.x'
        working-directory: packages/mcp
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          SRC_VERSION=$(node -e "const s=require('fs').readFileSync('src/version.ts','utf8');const m=s.match(/MCP_VERSION\s*=\s*'([^']+)'/);process.stdout.write(m?m[1]:'missing')")
          if [ "$PKG_VERSION" != "$SRC_VERSION" ]; then
            echo "::error::Version mismatch — packages/mcp/package.json reports $PKG_VERSION but src/version.ts reports $SRC_VERSION"
            echo "Bump both or neither."
            exit 1
          fi
          echo "Versions match: $PKG_VERSION"

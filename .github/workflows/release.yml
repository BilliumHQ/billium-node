name: Release

# Triggered by pushing a tag like `v1.0.0`. The tag MUST match the version in
# packages/node/package.json — the workflow checks this and refuses to publish
# on a mismatch (catches the most common release mistake: tagging without
# bumping the package, or vice versa).
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      contents: read
      # Required to mint a short-lived OIDC token used for npm provenance.
      # Without this, `npm publish` falls back to plain auth and the package
      # does not get the verified-build badge on npmjs.com.
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          # Writes an .npmrc pointing at the public registry so `npm publish`
          # targets it. Auth is via OIDC Trusted Publishing (see publish step),
          # not a token — there is no NODE_AUTH_TOKEN.
          registry-url: 'https://registry.npmjs.org'

      # npm Trusted Publishing (tokenless OIDC) requires npm >= 11.5.1. Node
      # 20.x bundles npm 10.x, which has no OIDC token exchange and falls back
      # to anonymous auth — that is why the first release after NPM_TOKEN was
      # dropped (v1.0.1) failed with a 404 on PUT. Upgrade npm before publish.
      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      # Build before lint/test: @billium/mcp's typecheck imports @billium/node,
      # whose types live in its built dist/ — linting first fails with TS2307.
      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # Reject the release if the git tag and the package.json version
      # disagree. The most common release mistake is tagging `v1.0.1` while
      # package.json still says `1.0.0` (or vice versa); without this guard,
      # the publish silently uses package.json and the tag becomes a lie.
      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./packages/node/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match packages/node/package.json version $PKG_VERSION"
            echo "Either re-tag, or bump package.json (and src/version.ts) and push a new tag."
            exit 1
          fi
          echo "Tag and package.json agree on $PKG_VERSION"

      - name: Publish to npm
        # Authentication happens via npm Trusted Publishing: the `id-token:
        # write` permission at the top of this job lets npm exchange a
        # GitHub OIDC token for a short-lived publish credential, scoped to
        # exactly this workflow + this repo + this package. There is no
        # long-lived NPM_TOKEN involved — if it ever leaked, there would be
        # nothing to leak.
        #
        # The trusted publisher binding is configured at:
        #   https://www.npmjs.com/package/@billium/node/access
        #   → Trusted Publishers → BilliumHQ/billium-node + .github/workflows/release.yml
        #
        # Provenance attestation is generated automatically from the same
        # OIDC context (visible on the package page as a "Built and signed
        # on GitHub Actions" badge).
        working-directory: packages/node
        run: npm publish

      # Extract just the section for this version out of CHANGELOG.md so the
      # GitHub release notes mirror what's already documented in the repo,
      # without us having to maintain release notes in two places.
      #
      # Looks for `## [X.Y.Z]` and copies everything until the next `## ` heading.
      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          awk -v ver="$TAG_VERSION" '
            $0 ~ "^## \\["ver"\\]" { in_section=1; next }
            in_section && /^## / { exit }
            in_section { print }
          ' packages/node/CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::warning::No CHANGELOG entry found for $TAG_VERSION; release notes will be empty."
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          # If the CHANGELOG section is missing, fall back to a default body
          # rather than failing the whole release — the npm publish has
          # already succeeded by this point and we don't want a missing
          # release note to look like a publish failure.
          generate_release_notes: false
        continue-on-error: true

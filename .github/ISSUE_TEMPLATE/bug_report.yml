name: Bug report
description: Something in @billium/node isn't working as documented.
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. The more specific you are, the faster we can fix it.

        **Before filing**, please make sure you're on the latest version of `@billium/node` — many issues are already fixed in newer releases.

  - type: textarea
    id: description
    attributes:
      label: What happened
      description: A clear description of what you observed and what you expected.
      placeholder: |
        I called `billium.invoices.create({...})` and got back an invoice with `customer: null`,
        but I passed `customerEmail: 'foo@bar.com'`. I expected `customer.email` to be set.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: |
        The smallest piece of code that reproduces the issue. If we can't reproduce it,
        we can't fix it.
      render: typescript
      placeholder: |
        import Billium from '@billium/node';

        const billium = new Billium({
          apiKey: process.env.BILLIUM_API_KEY,
          merchantId: process.env.BILLIUM_MERCHANT_ID,
        });

        const invoice = await billium.invoices.create({
          name: 'Test',
          rawAmount: 10,
          customerEmail: 'foo@bar.com',
        });

        console.log(invoice.customer); // null — expected { email: 'foo@bar.com', ... }
    validations:
      required: true

  - type: input
    id: sdk-version
    attributes:
      label: "@billium/node version"
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: "v20.10.0"
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Node.js
        - Deno
        - Bun
        - Cloudflare Workers
        - Vercel Edge
        - Other (describe in environment)
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: OS, framework, bundler, anything that might be relevant.
      placeholder: macOS 14.5, Next.js 14.2 (App Router), running locally
